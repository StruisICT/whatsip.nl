name: Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly performance tests at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build-and-validate:
    name: Build & Validation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build site
        run: npm run build
      
      - name: Run build validation
        run: npm run test:build
      
      - name: Run HTML validation
        run: npm run test:html
      
      - name: Run link checker
        run: npm run test:links
      
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Network jobs run against a local `wrangler pages dev` (real edge runtime,
  # same functions code). Production is NOT reachable from GitHub runners:
  # Cloudflare bot protection 403s datacenter IPs.
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: build-and-validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Start local edge runtime
        run: |
          npx wrangler pages dev dist --port 8788 > wrangler-dev.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8788/en/ >/dev/null && exit 0; sleep 2; done
          echo "wrangler pages dev failed to start"; cat wrangler-dev.log; exit 1

      - name: Run API tests
        run: npm run test:api
        env:
          TEST_URL: http://localhost:8788

  e2e-tests:
    name: E2E Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: build-and-validate
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Build site
        run: npm run build

      - name: Start local edge runtime
        run: |
          npx wrangler pages dev dist --port 8788 > wrangler-dev.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8788/en/ >/dev/null && exit 0; sleep 2; done
          echo "wrangler pages dev failed to start"; cat wrangler-dev.log; exit 1

      - name: Run E2E tests
        # site.spec.ts only — visual.spec.ts needs committed baselines (separate job)
        run: npx playwright test tests/e2e/site.spec.ts --project=${{ matrix.project }}
        env:
          TEST_URL: http://localhost:8788
      
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: build-and-validate
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Start local edge runtime
        run: |
          npx wrangler pages dev dist --port 8788 > wrangler-dev.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8788/en/ >/dev/null && exit 0; sleep 2; done
          echo "wrangler pages dev failed to start"; cat wrangler-dev.log; exit 1

      - name: Run accessibility tests
        run: npm run test:a11y
        env:
          TEST_URL: http://localhost:8788

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    # Only run on schedule or manual trigger (slower tests)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Start local edge runtime
        run: |
          npx wrangler pages dev dist --port 8788 > wrangler-dev.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8788/en/ >/dev/null && exit 0; sleep 2; done
          echo "wrangler pages dev failed to start"; cat wrangler-dev.log; exit 1

      - name: Run performance tests
        run: npm run test:perf
        env:
          TEST_URL: http://localhost:8788
      
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 30

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    # Only on PRs (to catch visual changes)
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Start local edge runtime
        run: |
          npx wrangler pages dev dist --port 8788 > wrangler-dev.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8788/en/ >/dev/null && exit 0; sleep 2; done
          echo "wrangler pages dev failed to start"; cat wrangler-dev.log; exit 1

      - name: Run visual tests
        run: npm run test:visual
        env:
          TEST_URL: http://localhost:8788
      
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: test-results/
          retention-days: 7
