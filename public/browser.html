<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title.browser">Browser info — whatsip.nl</title>
  <meta name="description" content="See what your browser reveals: device, operating system, screen, GPU, languages, timezone and connection type. Read locally, never sent anywhere." />
  <link rel="canonical" href="https://whatsip.nl/browser" />
  <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <script>try{var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t)}catch(e){}</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1732510177342289" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/style.css" />
  <script defer src="/i18n.js"></script>
  <script defer src="/app.js"></script>
</head>
<body>
  <header class="nav">
    <a class="brand" href="/">whatsip<span>.nl</span></a>
    <nav class="tabs" aria-label="Tools">
      <a href="/" data-i18n="nav.myip">My IP</a>
      <a href="/browser" aria-current="page" data-i18n="nav.browser">Browser</a>
      <a href="/headers" data-i18n="nav.headers">Headers</a>
      <a href="/webrtc" data-i18n="nav.webrtc">WebRTC</a>
      <a href="/ipv6" data-i18n="nav.ipv6">IPv6</a>
      <a class="soon" aria-disabled="true" data-i18n="nav.dns">DNS</a>
    </nav>
    <button class="theme-btn" id="lang" type="button" data-i18n-aria="aria.lang">EN</button>
    <button class="theme-btn" id="theme" type="button" data-i18n-aria="aria.theme">🌓</button>
  </header>

  <main>
    <div class="page">
      <h1 class="title" data-i18n="b.title">Browser &amp; device info</h1>
      <p class="label" data-i18n="b.local">Everything below is read locally in your browser — it is not sent to us.</p>
      <section class="grid" id="grid" aria-label="Browser details"></section>

      <ins class="adsbygoogle ad" style="display:block"
           data-ad-client="ca-pub-1732510177342289" data-ad-slot="0000000000"
           data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </main>

  <footer><span data-i18n="footer.note">No cookies. No tracking.</span> &nbsp;·&nbsp; <a href="/privacy.html" data-i18n="footer.privacy">Privacy</a></footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var t = window.t || function (k) { return k; };
      function esc(s){return String(s).replace(/[<>&]/g,function(c){return{"<":"&lt;",">":"&gt;","&":"&amp;"}[c];});}
      function field(k,v){if(v===null||v===undefined||v===""||v==="unknown")return"";return '<div class="field"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+"</div></div>";}
      function gpu(){try{var c=document.createElement("canvas");var gl=c.getContext("webgl")||c.getContext("experimental-webgl");if(!gl)return null;var i=gl.getExtension("WEBGL_debug_renderer_info");return i?gl.getParameter(i.UNMASKED_RENDERER_WEBGL):null;}catch(e){return null;}}
      function yn(b){return b?t("v.yes"):t("v.no");}

      var n=navigator, s=screen, conn=n.connection||n.mozConnection||n.webkitConnection||{};
      var uaD=n.userAgentData, tz=null;
      try{tz=Intl.DateTimeFormat().resolvedOptions().timeZone;}catch(e){}

      document.getElementById("grid").innerHTML=
        field(t("f.browser"),uaD&&uaD.brands?uaD.brands.map(function(b){return b.brand+" "+b.version;}).filter(function(x){return !/Not.?A.?Brand/i.test(x);}).join(", "):null)+
        field(t("f.platform"),uaD?uaD.platform:n.platform)+
        field(t("f.mobile"),uaD?yn(uaD.mobile):null)+
        field(t("f.languages"),(n.languages||[n.language]).join(", "))+
        field(t("f.timezone"),tz)+
        field(t("f.screen"),s.width+"×"+s.height+" ("+s.colorDepth+"-bit)")+
        field(t("f.viewport"),window.innerWidth+"×"+window.innerHeight)+
        field(t("f.dpr"),window.devicePixelRatio)+
        field(t("f.cores"),n.hardwareConcurrency)+
        field(t("f.memory"),n.deviceMemory?n.deviceMemory+" GB":null)+
        field(t("f.touch"),n.maxTouchPoints)+
        field(t("f.gpu"),gpu())+
        field(t("f.conn"),conn.effectiveType?conn.effectiveType.toUpperCase()+(conn.downlink?" · ~"+conn.downlink+" Mbps":"")+(conn.rtt?" · "+conn.rtt+" ms":""):null)+
        field(t("f.savedata"),conn.saveData?t("v.on"):null)+
        field(t("f.cookies"),yn(n.cookieEnabled))+
        field(t("f.dnt"),n.doNotTrack==="1"?t("v.on"):t("v.off"))+
        field(t("f.online"),yn(n.onLine))+
        field(t("f.ua"),n.userAgent);
    });
  </script>
</body>
</html>
