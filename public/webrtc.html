<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title.webrtc">WebRTC leak test — whatsip.nl</title>
  <meta name="description" content="WebRTC leak test: check whether your browser exposes your local network address or, behind a VPN, your real IP. Runs entirely in your browser." />
  <link rel="canonical" href="https://whatsip.nl/webrtc" />
  <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <script>try{var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t)}catch(e){}</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1732510177342289" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/style.css" />
  <script defer src="/i18n.js"></script>
  <script defer src="/app.js"></script>
</head>
<body>
  <header class="nav">
    <a class="brand" href="/">whatsip<span>.nl</span></a>
    <nav class="tabs" aria-label="Tools">
      <a href="/" data-i18n="nav.myip">My IP</a>
      <a href="/browser" data-i18n="nav.browser">Browser</a>
      <a href="/headers" data-i18n="nav.headers">Headers</a>
      <a href="/webrtc" aria-current="page" data-i18n="nav.webrtc">WebRTC</a>
      <a href="/ipv6" data-i18n="nav.ipv6">IPv6</a>
      <a class="soon" aria-disabled="true" data-i18n="nav.dns">DNS</a>
    </nav>
    <button class="theme-btn" id="lang" type="button" data-i18n-aria="aria.lang">EN</button>
    <button class="theme-btn" id="theme" type="button" data-i18n-aria="aria.theme">🌓</button>
  </header>

  <main>
    <div class="page">
      <h1 class="title" data-i18n="w.title">WebRTC leak test</h1>
      <p class="label" data-i18n="w.desc">WebRTC can reveal your local network address and, behind a VPN, sometimes your real IP. This test runs entirely in your browser.</p>

      <div class="card"><p class="status-line" id="status" data-i18n="w.testing">Testing…</p></div>
      <section class="grid" id="grid" aria-label="WebRTC results"></section>

      <ins class="adsbygoogle ad" style="display:block"
           data-ad-client="ca-pub-1732510177342289" data-ad-slot="0000000000"
           data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </main>

  <footer><span data-i18n="footer.note">No cookies. No tracking.</span> &nbsp;·&nbsp; <a href="/privacy.html" data-i18n="footer.privacy">Privacy</a></footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var t = window.t || function (k) { return k; };
      function esc(s){return String(s).replace(/[<>&]/g,function(c){return{"<":"&lt;",">":"&gt;","&":"&amp;"}[c];});}
      function field(k,v){return '<div class="field"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+"</div></div>";}

      var statusEl=document.getElementById("status"), gridEl=document.getElementById("grid");
      var local={}, pub={}, serverIp="";

      fetch("/api/info",{cache:"no-store"}).then(function(r){return r.json();}).then(function(d){serverIp=d.ip||"";}).catch(function(){});

      function render(done){
        var locals=Object.keys(local), publics=Object.keys(pub);
        gridEl.innerHTML=
          field(t("w.local"), locals.length?locals.join(", "):t("w.none"))+
          field(t("w.public"), publics.length?publics.join(", "):t("w.none"))+
          (serverIp?field(t("w.compare"), serverIp):"");
        if(!done) return;
        if(publics.length){statusEl.textContent=t("w.warn");statusEl.className="status-line status-warn";}
        else {statusEl.textContent=t("w.safe");statusEl.className="status-line status-ok";}
      }

      var RTC=window.RTCPeerConnection||window.webkitRTCPeerConnection||window.mozRTCPeerConnection;
      if(!RTC){statusEl.textContent=t("w.off");statusEl.className="status-line status-ok";render(false);return;}

      try{
        var pc=new RTC({iceServers:[{urls:"stun:stun.cloudflare.com:3478"}]});
        pc.createDataChannel("");
        var finished=false;
        function finish(){if(finished)return;finished=true;try{pc.close();}catch(e){}render(true);}
        pc.onicecandidate=function(e){
          if(!e.candidate||!e.candidate.candidate){finish();return;}
          var c=e.candidate.candidate, parts=c.split(" ");
          var addr=parts[4], typ=c.indexOf("typ ")>=0?c.split("typ ")[1].split(" ")[0]:"";
          if(!addr) return;
          if(/\.local$/i.test(addr)) local[addr]=1;
          else if(typ==="host") local[addr]=1;
          else if(typ==="srflx"||typ==="prflx") pub[addr]=1;
          render(false);
        };
        pc.createOffer().then(function(o){return pc.setLocalDescription(o);}).catch(function(){finish();});
        setTimeout(finish,4000);
      }catch(e){statusEl.textContent=t("w.off");statusEl.className="status-line status-ok";render(false);}
    });
  </script>
</body>
</html>
