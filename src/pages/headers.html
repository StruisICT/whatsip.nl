<main>
  <div class="page">
    <h1 class="title">{{t:h.title}}</h1>
    <p class="label">{{t:h.desc}}</p>
    <section class="grid" id="grid" aria-label="Request headers"></section>
    <button class="btn" id="copy" type="button" style="margin-top:1.25rem" disabled>{{t:h.copy}}</button>

    <ins class="adsbygoogle ad" style="display:block"
         data-ad-client="ca-pub-1732510177342289" data-ad-slot="0000000000"
         data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

    <section class="explainer">
      <h2>{{t:h.about.h}}</h2>
      <p>{{t:h.about.p1}}</p>
      <p>{{t:h.about.p2}}</p>
      <h3>{{t:h.about.h2}}</h3>
      <p>{{t:h.about.p3}}</p>
    </section>
  </div>
</main>
