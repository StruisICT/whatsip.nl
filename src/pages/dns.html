<div class="page">
  <h1>{{t:dns.title}}</h1>
  <p class="intro">{{t:dns.desc}}</p>

  <section class="card" style="margin-bottom: 1.5rem;">
    <h2 style="font-size: 1.1rem; margin-bottom: 0.75rem;">{{t:dns.leak.test}}</h2>
    <p id="leak-status" style="font-weight: 600;">{{t:dns.leak.running}}</p>
    <div id="leak-results" style="margin-top: 1rem;"></div>
    <button id="retest-btn" class="btn" style="margin-top: 1rem; display: none;">{{t:dns.leak.retest}}</button>
  </section>

  <section class="card" style="margin-bottom: 1.5rem;">
    <h2 style="font-size: 1.1rem; margin-bottom: 0.75rem;">{{t:dns.doh}}</h2>
    <p id="doh-status" style="font-weight: 600;">{{t:dns.doh.checking}}</p>
    <p id="doh-detail" style="font-size: 0.9rem; color: var(--muted); margin-top: 0.5rem;"></p>
  </section>

  <section class="explainer">
    <h2>{{t:dns.about.h}}</h2>
    <p>{{t:dns.about.p1}}</p>
    <p>{{t:dns.about.p2}}</p>
    <h3>{{t:dns.about.h2}}</h3>
    <p>{{t:dns.about.p3}}</p>
  </section>
</div>

<script src="{{@dns}}"></script>
