<main>
  <div class="page">
    <h1 class="title">{{t:w.title}}</h1>
    <p class="label">{{t:w.desc}}</p>

    <div class="card"><p class="status-line" id="status">{{t:w.testing}}</p></div>
    <section class="grid" id="grid" aria-label="WebRTC results"></section>

    <ins class="adsbygoogle ad" style="display:block"
         data-ad-client="ca-pub-1732510177342289" data-ad-slot="0000000000"
         data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(function(){var a=document.querySelector(".adsbygoogle");if(a&&a.dataset.adSlot!=="0000000000"){(adsbygoogle=window.adsbygoogle||[]).push({});}})();</script>

    <section class="explainer">
      <h2>{{t:w.about.h}}</h2>
      <p>{{t:w.about.p1}}</p>
      <p>{{t:w.about.p2}}</p>
      <h3>{{t:w.about.h2}}</h3>
      <p>{{t:w.about.p3}}</p>
    </section>
  </div>
</main>
